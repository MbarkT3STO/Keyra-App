name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        working-directory: Authenticator-Android
        run: npm ci

      - name: Build web assets
        working-directory: Authenticator-Android
        run: |
          node scripts/build-html.cjs
          npm run build

      - name: Add Android platform
        working-directory: Authenticator-Android
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        working-directory: Authenticator-Android
        run: npx cap sync android

      - name: Patch AndroidManifest — permissions + edge-to-edge
        working-directory: Authenticator-Android/android/app/src/main
        run: |
          # Add permissions before </manifest>
          sed -i 's|</manifest>|    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.USE_BIOMETRIC" />\n    <uses-permission android:name="android.permission.USE_FINGERPRINT" />\n    <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />\n</manifest>|' AndroidManifest.xml

          # Make status bar transparent for edge-to-edge
          sed -i 's|android:theme="@style/AppTheme"|android:theme="@style/AppTheme"\n            android:windowSoftInputMode="adjustResize"|' AndroidManifest.xml

      - name: Build debug APK
        working-directory: Authenticator-Android/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: keyra-debug-apk
          path: Authenticator-Android/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
